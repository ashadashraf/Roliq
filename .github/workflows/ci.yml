name: CI
on:
  pull_request:
  push: { branches: [main] }
permissions: { contents: read }
jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.13.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22.13.1, cache: pnpm }
      - uses: actions/setup-go@v5
        with: { go-version: 1.25.3, cache: true }
      - uses: actions/setup-python@v5
        with:
          {
            python-version: "3.13",
            cache: pip,
            cache-dependency-path: services/ai/pyproject.toml,
          }
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -e "./services/ai[dev]"
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      - run: test -z "$(gofmt -l internal services workers packages/contracts)"
      - run: go test ./...
      - run: go vet ./...
      - run: python -m pytest services/ai/tests
        env:
          PYTHONPATH: services/ai
      - run: python tools/fixtures/validate_resume_fixtures.py
        env:
          PYTHONPATH: services/ai
      - run: docker run --rm -v "$PWD:/src" -w /src sqlc/sqlc:1.30.0 compile
      - run: docker compose --env-file .env.compose.example config --quiet
  containers:
    runs-on: ubuntu-latest
    needs: application
    strategy:
      matrix:
        include:
          - { target: api, dockerfile: services/api/Dockerfile }
          - { target: worker, dockerfile: workers/background/Dockerfile }
          - { target: web, dockerfile: apps/web/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f ${{ matrix.dockerfile }} --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080 --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2xlcmsuZXhhbXBsZS5jb20k .
