apiVersion: apps/v1
kind: Deployment
metadata: { name: api }
spec:
  replicas: 2
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      serviceAccountName: api
      securityContext:
        { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: api
          image: roliq-api
          ports: [{ name: http, containerPort: 8080 }]
          envFrom:
            [
              { configMapRef: { name: roliq-runtime } },
              { secretRef: { name: roliq-api } },
            ]
          readinessProbe:
            {
              httpGet: { path: /health/ready, port: http },
              initialDelaySeconds: 5,
              periodSeconds: 10,
            }
          livenessProbe:
            {
              httpGet: { path: /health/live, port: http },
              initialDelaySeconds: 10,
              periodSeconds: 15,
            }
          resources:
            {
              requests: { cpu: 100m, memory: 128Mi },
              limits: { cpu: 1000m, memory: 512Mi },
            }
          securityContext:
            {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: true,
              capabilities: { drop: [ALL] },
            }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: web }
spec:
  replicas: 2
  selector: { matchLabels: { app: web } }
  template:
    metadata: { labels: { app: web } }
    spec:
      serviceAccountName: web
      securityContext:
        { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: web
          image: roliq-web
          ports: [{ name: http, containerPort: 3000 }]
          envFrom: [{ secretRef: { name: roliq-web } }]
          readinessProbe:
            {
              httpGet: { path: /, port: http },
              initialDelaySeconds: 5,
              periodSeconds: 10,
            }
          resources:
            {
              requests: { cpu: 100m, memory: 128Mi },
              limits: { cpu: 750m, memory: 512Mi },
            }
          securityContext:
            {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: true,
              capabilities: { drop: [ALL] },
            }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: background-worker }
spec:
  replicas: 2
  selector: { matchLabels: { app: background-worker } }
  template:
    metadata: { labels: { app: background-worker } }
    spec:
      serviceAccountName: background-worker
      securityContext:
        { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: worker
          image: roliq-worker
          envFrom:
            [
              { configMapRef: { name: roliq-runtime } },
              { secretRef: { name: roliq-worker } },
            ]
          resources:
            {
              requests: { cpu: 100m, memory: 128Mi },
              limits: { cpu: 1000m, memory: 768Mi },
            }
          securityContext:
            {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: true,
              capabilities: { drop: [ALL] },
            }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: api }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: web }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: background-worker }
